<script>
    // Single-Page Apps for GitHub Pages — path restore.
    // Pairs with public/404.html: decodes the redirected path back into the URL
    // before React Router mounts, so deep links like /projects work.
    (function (l) {
        if (l.search[1] === '/') {
            var decoded = l.search.slice(1).split('&').map(function (s) {
                return s.replace(/~and~/g, '&');
            }).join('?');
            window.history.replaceState(null, null,
                l.pathname.slice(0, -1) + decoded + l.hash
            );
        }
    }(window.location));
</script>
