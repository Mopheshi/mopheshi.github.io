name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master # Triggers the workflow on pushes to your source code branch
  workflow_dispatch: # Allows manual trigger from the Actions tab

permissions:
  contents: write # Needed to push the built assets to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to main branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: main
          force_orphan: true # Keeps the main branch history clean with just 1 commit
          commit_message: "Deploy from CI/CD Pipeline"

