<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#fdf6b2"/>

  <!-- decorative sparkle top-right -->
  <g transform="translate(1040,80)">
    <path d="M30 4 L33 27 L56 30 L33 33 L30 56 L27 33 L4 30 L27 27 Z" fill="#0a1a5e"/>
    <path d="M50 8 L51.5 14 L57 15.5 L51.5 17 L50 23 L48.5 17 L43 15.5 L48.5 14 Z" fill="#0a1a5e"/>
  </g>

  <!-- scribble bottom-left -->
  <g transform="translate(80,520)" stroke="#0a1a5e" stroke-width="3" stroke-linecap="round">
    <line x1="0"  y1="5" x2="-5"  y2="35"/>
    <line x1="22" y1="5" x2="17"  y2="35"/>
    <line x1="44" y1="5" x2="39"  y2="35"/>
    <line x1="66" y1="5" x2="61"  y2="35"/>
  </g>

  <!-- name -->
  <text x="80" y="180" fill="#0a1a5e"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="800" font-size="44" letter-spacing="-1">
    Ndachimya Edward.
  </text>

  <!-- main heading -->
  <text x="80" y="340" fill="#0a1a5e"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="800" font-size="140" letter-spacing="-4">
    AI Engineer
  </text>
  <text x="80" y="460" fill="#0a1a5e"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-weight="800" font-size="140" letter-spacing="-4">
