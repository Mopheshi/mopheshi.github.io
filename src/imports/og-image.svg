  </text>

  <!-- bottom-right url pill -->
  <g transform="translate(820,540)">
    <rect x="0" y="0" width="300" height="56" fill="#fff9c4" stroke="#0a1a5e" stroke-width="2"/>
    <text x="150" y="36" fill="#0a1a5e" text-anchor="middle"
